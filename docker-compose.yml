version: "3.9"

services:
  app:
    build: .
    container_name: cicd-demo-app
    ports:
      - "5000:5000"
    environment:
      - APP_ENV=development
      - APP_VERSION=1.0.0
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: cicd-demo-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: unless-stopped